<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstraNotes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .note-item { cursor: pointer; transition: background 0.15s; }
    .note-item:hover { background-color: #EEF2FF; }
    .note-item.active { background-color: #E0E7FF; border-left: 3px solid #6366F1; }
    #note-body { resize: vertical; min-height: 240px; }

    /* ── Toast notifications ── */
    #toast-container {
      position: fixed; top: 1rem; right: 1rem; z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      pointer-events: all; display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12); max-width: 22rem;
      animation: toastIn 0.2s ease;
    }
    .toast-error  { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
    .toast-success{ background:#F0FDF4; color:#166534; border:1px solid #BBF7D0; }
    .toast-info   { background:#EFF6FF; color:#1E40AF; border:1px solid #BFDBFE; }
    .toast-msg    { flex: 1; line-height: 1.4; }
    .toast-close  { background:none; border:none; cursor:pointer; opacity:0.5;
                    font-size:1rem; line-height:1; padding:0; flex-shrink:0; }
    .toast-close:hover { opacity: 1; }
    @keyframes toastIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── History panel ── */
    #history-panel {
      position: fixed; top: 0; right: 0; width: 22rem; height: 100vh;
      background: white; border-left: 1px solid #E2E8F0;
      box-shadow: -4px 0 24px rgba(0,0,0,0.08); z-index: 100;
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.25s ease;
    }
    #history-panel.open { transform: translateX(0); }
    .version-badge {
      display: inline-block; font-size: 0.65rem; font-weight: 600;
      padding: 0.15rem 0.45rem; border-radius: 9999px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-create { background:#DCFCE7; color:#166534; }
    .badge-update { background:#DBEAFE; color:#1E40AF; }
    .badge-revert { background:#FEF9C3; color:#854D0E; }

    /* ── Inline field error ── */
    .field-error { color: #DC2626; font-size: 0.75rem; margin-top: 0.25rem; }

    /* ── Tags pill display ── */
    .tag-pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      background: #EEF2FF; color: #4338CA; font-size: 0.7rem;
      padding: 0.15rem 0.5rem; border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<!-- ── History panel ── -->
<aside id="history-panel">
  <div class="flex items-center justify-between px-4 py-3 border-b bg-slate-50">
    <h3 class="text-sm font-semibold text-slate-700">Version History</h3>
    <button onclick="closeHistory()" class="text-slate-400 hover:text-slate-600 text-lg leading-none">&times;</button>
  </div>
  <div id="history-list" class="flex-1 overflow-y-auto p-4">
    <p class="text-slate-400 text-sm text-center py-8">Loading…</p>
  </div>
</aside>

<!-- ── Login / Register Section ── -->
<section id="login-section" class="hidden min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-3xl font-bold text-indigo-600 mb-1">&#10022; AstraNotes</div>
      <p class="text-slate-500 text-sm">Your secure note space</p>
    </div>

    <!-- Tabs -->
    <div class="flex border-b mb-6">
      <button id="tab-login" onclick="switchTab('login')"
        class="flex-1 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600">
        Login
      </button>
      <button id="tab-register" onclick="switchTab('register')"
        class="flex-1 py-2 text-sm font-medium text-slate-400 border-b-2 border-transparent">
        Register
      </button>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input id="auth-username" type="text" placeholder="Enter username"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input id="auth-password" type="password" placeholder="Enter password"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <p id="auth-error" class="text-red-500 text-sm hidden"></p>
      <button id="auth-submit" onclick="handleAuthSubmit()"
        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
        Sign In
      </button>
    </div>
  </div>
</section>

<!-- ── App Section ── -->
<section id="app-section" class="hidden flex flex-col h-screen">
  <!-- Header -->
  <header class="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="text-xl font-bold text-indigo-600">&#10022; AstraNotes</div>
    <div class="flex items-center gap-4">
      <span class="text-sm text-slate-500">Welcome, <span id="header-username" class="font-medium text-slate-700"></span></span>
      <button onclick="logout()" class="text-sm text-slate-500 hover:text-red-500 transition">Logout</button>
    </div>
  </header>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r flex flex-col">
      <div class="p-4 border-b">
        <button onclick="createNote()"
          class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
          + New Note
        </button>
      </div>
      <div id="note-list" class="flex-1 overflow-y-auto py-2">
        <!-- Notes rendered here -->
      </div>
    </aside>

    <!-- Editor -->
    <main class="flex-1 p-6 overflow-y-auto bg-slate-50">
      <div id="editor-placeholder" class="flex flex-col items-center justify-center h-full text-slate-400">
        <div class="text-5xl mb-3">&#128221;</div>
        <p class="text-lg font-medium">Select a note to edit</p>
        <p class="text-sm">or click <strong>+ New Note</strong> to create one</p>
      </div>

      <div id="editor-panel" class="hidden max-w-2xl">
        <!-- Title -->
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Title</label>
          <input id="note-title" type="text" placeholder="Note title"
            class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-lg font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400"
            oninput="clearFieldError('title-error')">
          <p id="title-error" class="field-error hidden"></p>
        </div>

        <!-- Body -->
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Body</label>
          <textarea id="note-body" placeholder="Write your note here…"
            class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-slate-700"></textarea>
        </div>

        <!-- Tags -->
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
            Tags <span class="text-slate-400 normal-case font-normal">(comma-separated, case-sensitive)</span>
          </label>
          <input id="note-tags" type="text" placeholder="e.g. python, study, work"
            class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <!-- Visibility + meta -->
        <div class="mb-6 flex items-center gap-3">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Visibility</label>
          <select id="note-visibility"
            class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="private">&#128274; Private</option>
            <option value="public">&#127758; Public</option>
          </select>
          <span id="note-meta" class="text-xs text-slate-400 ml-auto"></span>
        </div>

        <!-- Action buttons -->
        <div class="flex gap-3 flex-wrap items-center">
          <button onclick="saveNote()"
            class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
            Save Changes
          </button>
          <button onclick="deleteNote()"
            class="bg-red-500 text-white px-5 py-2 rounded-lg font-medium hover:bg-red-600 transition">
            Delete
          </button>
          <button onclick="toggleHistory()"
            class="bg-slate-100 text-slate-600 px-5 py-2 rounded-lg font-medium hover:bg-slate-200 transition flex items-center gap-1.5">
            &#128336; History
          </button>
          <span id="save-status" class="self-center text-sm text-green-600 font-medium hidden"></span>
        </div>
      </div>
    </main>
  </div>
</section>

<script>
// ── State ────────────────────────────────────────────────────────────────
let token = localStorage.getItem('astranotes_token');
let currentUser = localStorage.getItem('astranotes_user');
let currentNoteId = null;
let notes = [];
let authMode = 'login';
let historyOpen = false;

// ── Bootstrap ────────────────────────────────────────────────────────────
window.onload = () => {
  if (token) showApp();
  else        showLogin();
};

// ── Toast notifications ───────────────────────────────────────────────────
function showToast(msg, type = 'error') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="toast-msg">${escapeHtml(msg)}</span>
    <button class="toast-close" onclick="this.parentElement.remove()" title="Dismiss">&times;</button>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

// ── Inline field errors ───────────────────────────────────────────────────
function showFieldError(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.remove('hidden');
}

function clearFieldError(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('hidden');
}

// ── Section control ───────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-section').classList.remove('hidden');
  document.getElementById('app-section').classList.add('hidden');
}

function showApp() {
  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('app-section').classList.remove('hidden');
  document.getElementById('header-username').textContent = currentUser || '';
  loadNotes();
}

function switchTab(mode) {
  authMode = mode;
  const loginTab    = document.getElementById('tab-login');
  const registerTab = document.getElementById('tab-register');
  const submitBtn   = document.getElementById('auth-submit');
  const active   = ['text-indigo-600', 'border-indigo-600'];
  const inactive = ['text-slate-400',  'border-transparent'];

  if (mode === 'login') {
    loginTab.classList.add(...active);    loginTab.classList.remove(...inactive);
    registerTab.classList.remove(...active); registerTab.classList.add(...inactive);
    submitBtn.textContent = 'Sign In';
  } else {
    registerTab.classList.add(...active);  registerTab.classList.remove(...inactive);
    loginTab.classList.remove(...active);  loginTab.classList.add(...inactive);
    submitBtn.textContent = 'Create Account';
  }
  clearAuthError();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function clearAuthError() {
  document.getElementById('auth-error').classList.add('hidden');
}

// ── Auth ──────────────────────────────────────────────────────────────────
async function handleAuthSubmit() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  clearAuthError();

  if (!username) { showAuthError('Username is required.'); return; }
  if (!password) { showAuthError('Password is required.'); return; }

  const endpoint       = authMode === 'login' ? '/auth/login' : '/auth/register';
  const expectedStatus = authMode === 'login' ? 200 : 201;

  try {
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
    });
    const data = await res.json();
    if (res.status === expectedStatus) {
      token       = data.access_token;
      currentUser = username;
      localStorage.setItem('astranotes_token', token);
      localStorage.setItem('astranotes_user',  currentUser);
      document.getElementById('auth-username').value = '';
      document.getElementById('auth-password').value = '';
      showApp();
    } else if (res.status === 422) {
      // Pydantic validation error
      const detail = data.detail;
      const msg = Array.isArray(detail)
        ? detail.map(d => d.msg).join('; ')
        : (detail || 'Validation error.');
      showAuthError(msg);
    } else {
      showAuthError(data.detail || (authMode === 'login' ? 'Invalid username or password.' : 'Registration failed.'));
    }
  } catch {
    showAuthError('Cannot connect to server. Is it running?');
  }
}

function logout() {
  token = currentUser = currentNoteId = null;
  notes = [];
  localStorage.removeItem('astranotes_token');
  localStorage.removeItem('astranotes_user');
  closeHistory();
  showLogin();
}

// ── API helper ────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const headers = {'Content-Type': 'application/json'};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  try {
    const res = await fetch(path, {
      method,
      headers,
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) { logout(); return null; }
    return res;
  } catch {
    showToast('Cannot connect to server. Check that AstraNotes is running.', 'error');
    return null;
  }
}

// Extract human-readable error from a failed response
async function errorDetail(res) {
  try {
    const data = await res.json();
    if (Array.isArray(data.detail)) return data.detail.map(d => d.msg).join('; ');
    return data.detail || `Server error (${res.status})`;
  } catch {
    return `Server error (${res.status})`;
  }
}

// ── Notes ─────────────────────────────────────────────────────────────────
async function loadNotes() {
  const res = await api('GET', '/notes/');
  if (!res) return;
  if (!res.ok) { showToast('Failed to load notes.', 'error'); return; }
  const data = await res.json();
  notes = data.notes || [];
  renderNoteList();
}

function renderNoteList() {
  const container = document.getElementById('note-list');
  if (notes.length === 0) {
    container.innerHTML = '<p class="text-center text-slate-400 text-sm py-8">No notes yet.<br>Click + New Note</p>';
    return;
  }
  container.innerHTML = notes.map(n => `
    <div class="note-item px-4 py-3 ${n.id === currentNoteId ? 'active' : ''}"
         onclick="selectNote('${n.id}')">
      <div class="text-sm font-medium text-slate-700 truncate">${escapeHtml(n.title)}</div>
      <div class="text-xs text-slate-400 mt-0.5 flex items-center gap-1.5">
        ${n.visibility === 'private' ? '&#128274;' : '&#127758;'} ${formatDate(n.updated_at)}
        ${n.tags && n.tags.length ? `· ${n.tags.slice(0,2).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}` : ''}
      </div>
    </div>
  `).join('');
}

async function createNote() {
  const res = await api('POST', '/notes/', {title: 'New Note', body: '', visibility: 'private'});
  if (!res) return;
  if (res.status !== 201) {
    showToast(await errorDetail(res), 'error');
    return;
  }
  const note = await res.json();
  notes.unshift(note);
  currentNoteId = note.id;
  renderNoteList();
  loadEditor(note);
}

async function selectNote(id) {
  const res = await api('GET', `/notes/${id}`);
  if (!res) return;
  if (res.status === 404) { showToast('Note not found — it may have been deleted.', 'error'); await loadNotes(); return; }
  if (res.status === 403) { showToast('You do not have permission to view this note.', 'error'); return; }
  if (!res.ok)            { showToast(await errorDetail(res), 'error'); return; }
  const note = await res.json();
  currentNoteId = id;
  renderNoteList();
  loadEditor(note);
}

function loadEditor(note) {
  document.getElementById('editor-placeholder').classList.add('hidden');
  document.getElementById('editor-panel').classList.remove('hidden');
  document.getElementById('note-title').value = note.title;
  document.getElementById('note-body').value  = note.body || '';
  document.getElementById('note-tags').value  = (note.tags || []).join(', ');
  document.getElementById('note-visibility').value = note.visibility;
  document.getElementById('note-meta').textContent = `v${note.version} · ${formatDate(note.updated_at)}`;
  document.getElementById('save-status').classList.add('hidden');
  clearFieldError('title-error');
  if (historyOpen) loadHistory();
}

async function saveNote() {
  if (!currentNoteId) return;
  const title      = document.getElementById('note-title').value.trim();
  const body       = document.getElementById('note-body').value;
  const visibility = document.getElementById('note-visibility').value;
  const tagsRaw    = document.getElementById('note-tags').value;
  const tags       = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  if (!title) {
    showFieldError('title-error', 'Title cannot be empty.');
    document.getElementById('note-title').focus();
    return;
  }

  const res = await api('PATCH', `/notes/${currentNoteId}`, {title, body, tags, visibility});
  if (!res) return;

  if (res.status === 404) { showToast('Note not found — it may have been deleted.', 'error'); await loadNotes(); return; }
  if (res.status === 403) { showToast('You do not have permission to edit this note.', 'error'); return; }
  if (res.status === 422) { showToast(await errorDetail(res), 'error'); return; }
  if (!res.ok)            { showToast(await errorDetail(res), 'error'); return; }

  const updated = await res.json();
  const idx = notes.findIndex(n => n.id === currentNoteId);
  if (idx !== -1) notes[idx] = updated;
  renderNoteList();
  loadEditor(updated);

  const status = document.getElementById('save-status');
  status.textContent = '✓ Saved';
  status.classList.remove('hidden');
  setTimeout(() => status.classList.add('hidden'), 2500);
  if (historyOpen) loadHistory();
}

async function deleteNote() {
  if (!currentNoteId) return;
  if (!confirm('Delete this note? This cannot be undone.')) return;

  const res = await api('DELETE', `/notes/${currentNoteId}`);
  if (!res) return;
  if (res.status === 404) { showToast('Note not found — it may have already been deleted.', 'info'); }
  else if (res.status === 403) { showToast('You do not have permission to delete this note.', 'error'); return; }
  else if (res.status !== 204) { showToast(await errorDetail(res), 'error'); return; }

  notes = notes.filter(n => n.id !== currentNoteId);
  currentNoteId = null;
  closeHistory();
  renderNoteList();
  document.getElementById('editor-placeholder').classList.remove('hidden');
  document.getElementById('editor-panel').classList.add('hidden');
}

// ── Version history ───────────────────────────────────────────────────────
function toggleHistory() {
  historyOpen ? closeHistory() : openHistory();
}

function openHistory() {
  historyOpen = true;
  document.getElementById('history-panel').classList.add('open');
  loadHistory();
}

function closeHistory() {
  historyOpen = false;
  document.getElementById('history-panel').classList.remove('open');
}

async function loadHistory() {
  if (!currentNoteId) return;
  document.getElementById('history-list').innerHTML =
    '<p class="text-slate-400 text-sm text-center py-8">Loading…</p>';

  const res = await api('GET', `/notes/${currentNoteId}/versions`);
  if (!res) return;
  if (res.status === 404) {
    document.getElementById('history-list').innerHTML =
      '<p class="text-slate-400 text-sm text-center py-8">Note not found.</p>';
    return;
  }
  if (!res.ok) {
    document.getElementById('history-list').innerHTML =
      `<p class="text-red-400 text-sm text-center py-8">Failed to load history.</p>`;
    return;
  }

  const data = await res.json();
  renderHistory(data.versions, data.total);
}

function renderHistory(versions, total) {
  const container = document.getElementById('history-list');
  if (!versions || versions.length === 0) {
    container.innerHTML = '<p class="text-slate-400 text-sm text-center py-8">No history yet.</p>';
    return;
  }

  const currentVersion = versions[versions.length - 1].version;

  container.innerHTML = [...versions].reverse().map(v => {
    const isCurrent = v.version === currentVersion;
    const badgeClass = {create:'badge-create', update:'badge-update', revert:'badge-revert'}[v.change_type] || 'badge-update';
    return `
      <div class="mb-3 p-3 rounded-lg border ${isCurrent ? 'border-indigo-300 bg-indigo-50' : 'border-slate-100 bg-white'}">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm font-semibold text-slate-700">v${v.version}</span>
          <span class="version-badge ${badgeClass}">${v.change_type}</span>
        </div>
        <div class="text-xs text-slate-500 truncate mb-2" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</div>
        <div class="text-xs text-slate-400 mb-2">${formatDate(v.at)}</div>
        ${isCurrent
          ? '<span class="text-xs text-indigo-500 font-medium">Current version</span>'
          : `<button onclick="revertToVersion(${v.version})"
               class="text-xs bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1 rounded-md hover:bg-amber-100 transition w-full">
               Revert to v${v.version}
             </button>`
        }
      </div>
    `;
  }).join('');
}

async function revertToVersion(version) {
  if (!currentNoteId) return;
  if (!confirm(`Revert to version ${version}? The current content will be saved as a new version.`)) return;

  const res = await api('POST', `/notes/${currentNoteId}/revert/${version}`);
  if (!res) return;

  if (res.status === 404) { showToast(await errorDetail(res), 'error'); return; }
  if (res.status === 403) { showToast('You do not have permission to revert this note.', 'error'); return; }
  if (!res.ok)            { showToast(await errorDetail(res), 'error'); return; }

  const reverted = await res.json();
  const idx = notes.findIndex(n => n.id === currentNoteId);
  if (idx !== -1) notes[idx] = reverted;
  renderNoteList();
  loadEditor(reverted);
  showToast(`Reverted to v${version} — now at v${reverted.version}.`, 'success');
}

// ── Utilities ─────────────────────────────────────────────────────────────
function escapeHtml(text) {
  return (text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  try {
    return new Date(isoStr).toLocaleDateString('en-US',
      {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  } catch { return isoStr; }
}

// Enter key on auth form
document.addEventListener('DOMContentLoaded', () => {
  ['auth-username', 'auth-password'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSubmit(); });
  });
});
</script>
